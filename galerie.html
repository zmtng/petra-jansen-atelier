<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie @ Art by Petra Jansen</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* ============================================================
           CSS OVERRIDES: Slider-Logik deaktivieren & Grid aktivieren
           ============================================================ */
        
        /* 1. Freies Scrollen auf der gesamten Seite erlauben */
        html, body, #wrapper, #dynamic-content {
            height: auto !important;
            overflow: auto !important; /* Scrollbars erzwingen */
            overflow-x: hidden !important;
        }

        /* 2. Den Container als Grid definieren (2 Spalten) */
        #dynamic-content {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Genau zwei pro Reihe */
            gap: 30px; /* Abstand zwischen den Bildern */
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto; /* Zentrieren */
            box-sizing: border-box;
            align-items: start; /* Verhindert, dass ungleich hohe Bilder Reihen verzerren */
        }

        /* Mobil-Optimierung: Auf Handys nur 1 Spalte */
        @media (max-width: 768px) {
            #dynamic-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        /* 3. Styling für die neuen Galerie-Karten (Grid-Items) */
        .gallery-grid-item {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .gallery-grid-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* Bild-Container, damit alle Bilder im Grid ähnlich wirken */
        .grid-image-wrapper {
            width: 100%;
            /* Wir erzwingen kein festes Seitenverhältnis, damit Kunstwerke */
            /* nicht beschnitten werden. Wir begrenzen nur die Höhe. */
            text-align: center;
            background: #000; /* Hintergrund falls Bild nicht ausfüllt */
        }

        .grid-img {
            max-width: 100%;
            height: auto;
            max-height: 70vh; /* Verhindert extrem lange Bilder */
            display: block;
            margin: 0 auto;
            object-fit: contain; /* Zeigt das ganze Bild unbeschnitten */
        }

        /* Details unter dem Bild */
        .grid-details {
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.2);
        }

        .grid-details h2 {
            font-size: 1.4rem;
            margin: 0;
            color: #fff;
            font-family: var(--font-fancy); /* Nutzt die Schrift aus style.css */
        }

        .grid-details p {
            margin: 8px 0 0 0;
            opacity: 0.7;
            font-style: italic;
            font-size: 0.95rem;
            color: #ddd;
        }

        /* 4. Loader und Footer Anpassungen für das Grid */
        #db-loader-slide {
            grid-column: 1 / -1; /* Loader spannt über beide Spalten */
            text-align: center;
            padding: 100px 0;
            /* Standardmäßig sichtbar, wird per JS ausgeblendet */
            display: block; 
        }

        #loader-text {
            font-size: 1.2rem;
            color: #fff;
        }

        /* Der Footer muss sich auch über beide Spalten erstrecken */
        #dynamic-content > footer {
            grid-column: 1 / -1;
            margin-top: 50px;
            width: 100%;
        }

    </style>
</head>

<body class="theme-2 scroll-snap-container">

    <header class="site-header fixed-header">
        <div class="logo">
            <a href="index.html">Art by Petra Jansen</a>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="galerie.html" class="active">Galerie</a></li>
                <li><a href="ueber-mich.html">Über mich</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
                <li><a href="gaestebuch.html">Gästebuch</a></li>
                <li><a href="datenschutz.html">Datenschutz</a></li>
            </ul>
        </nav>
    </header>

    <div id="wrapper">
        <main id="dynamic-content">
            
            <div id="db-loader-slide">
                <div class="slide-content">
                    <p id="loader-text">Kunstwerke werden geladen...</p>
                </div>
            </div>

            </main>
    </div>

    <!-- Footer Template (Wird ganz am Ende eingefügt) -->
    <div id="footer-template" style="display: none;">
        <section class="slide presentation-slide" data-theme="theme-4">
            <div class="slide-content">
                <h2>Interesse an einem Werk?</h2>
                <p>Lass uns gerne über Verfügbarkeiten und Preise sprechen.</p>
                <a href="kontakt.html" class="btn btn-large">Kontakt aufnehmen</a>
            </div>
            <footer class="slide-footer">
                <p>&copy; 2026 Sebastian Kaspers. Alle Rechte vorbehalten. | <a href="datenschutz.html" style="color: var(--text-muted); text-decoration: none;">Datenschutz</a></p>
            </footer>
        </section>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Großansicht">
        <p id="lightbox-caption" class="lightbox-caption"></p>
    </div>

    <script src="js/main.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            query, 
            orderBy, 
            onSnapshot,
            getDocs 
        } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // Deine Konfiguration (bitte kurz prüfen, ob die Projekt-ID stimmt)
        const firebaseConfig = {
            apiKey: "AIzaSyA4ZOLvHWohYF5IPsF2AmqWf039xMYAVs8",
            authDomain: "mama-portfolio.firebaseapp.com",
            projectId: "mama-portfolio",
            storageBucket: "mama-portfolio.firebasestorage.app",
            messagingSenderId: "953487415351",
            appId: "1:953487415351:web:83b1302f68960fa17987b2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const dynamicContainer = document.getElementById('dynamic-content');
        const loaderSlide = document.getElementById('db-loader-slide');

        // Hilfsfunktion: Erstellt ein Grid-Item (keine Slide mehr)
        function appendGalleryItem(imgData) {
            const div = document.createElement('div');
            div.className = 'gallery-grid-item';
            
            div.innerHTML = `
                <div class="grid-image-wrapper">
                    <img loading="lazy" 
                         class="grid-img"
                         src="${imgData.url}" 
                         alt="${imgData.title || 'Kunstwerk'}">
                </div>
                <div class="grid-details">
                    <h2>${imgData.title || 'Ohne Titel'}</h2>
                    <p>${imgData.subtitle || ''}</p>
                </div>`;
            
            dynamicContainer.appendChild(div);
        }

        // Wir behalten den Namen bei, damit dein Aufruf am Ende funktioniert
        async function startIncrementalLoading() {
            console.log("Galerie-Ladevorgang gestartet...");
            
            // 1. Loader sofort sichtbar machen
            if (loaderSlide) {
                loaderSlide.style.display = 'block';
                const loaderText = document.getElementById('loader-text');
                if (loaderText) loaderText.innerText = "Verbindung zur Galerie wird aufgebaut...";
            }

            try {
                await signInAnonymously(auth);
                console.log("Authentifizierung erfolgreich.");

                // Abfrage mit Sortierung
                const q = query(collection(db, 'gallery'), orderBy('timestamp', 'desc'));

                // Wir nutzen onSnapshot, damit die Galerie sich bei Änderungen selbst aktualisiert
                onSnapshot(q, (snapshot) => {
                    console.log("Daten empfangen, Anzahl Dokumente:", snapshot.size);
                    
                    // Container leeren
                    dynamicContainer.innerHTML = "";
                    
                    if (snapshot.empty) {
                        if (loaderSlide) {
                            loaderSlide.style.display = 'block';
                            document.getElementById('loader-text').innerText = "Die Galerie ist momentan noch leer.";
                        }
                        return;
                    }

                    // Loader ausblenden
                    if (loaderSlide) loaderSlide.style.display = 'none';

                    // Slides hinzufügen
                    snapshot.forEach((doc, index) => {
                        appendSlide(doc.data(), index);
                    });

                    // Footer am Ende einfügen
                    const footerTemplate = document.getElementById('footer-template');
                    if (footerTemplate) {
                        dynamicContainer.insertAdjacentHTML('beforeend', footerTemplate.innerHTML);
                    }
                    
                    // Scroll-Logik neu initialisieren falls vorhanden
                    //if (window.initAppLogic) window.initAppLogic();
                }, (error) => {
                    console.error("Fehler beim Laden:", error);
                    if (loaderSlide) {
                        loaderSlide.style.display = 'block';
                        document.getElementById('loader-text').innerText = "Fehler beim Laden: " + error.message;
                        document.getElementById('loader-text').style.color = "red";
                }
                });

            } catch (error) {
                console.error("Initialisierungsfehler:", error);
                handleLoadError(error);
            }
        }

        function handleLoadError(error) {
            if (loaderSlide) {
                loaderSlide.style.display = 'block';
                const loaderText = document.getElementById('loader-text');
                if (loaderText) {
                    loaderText.innerText = "Fehler beim Laden: " + error.message;
                    loaderText.style.color = "red";
                }
            }
        }

        // Startet den Prozess
        startIncrementalLoading();
    </script>
</body>
</html>
