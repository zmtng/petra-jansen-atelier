<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin @ Art by Petra Jansen</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-section { display: none; }
        .admin-section.active { display: block; animation: fadeIn 0.5s ease; }
        
        .upload-card {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px dashed var(--text-muted);
        }

        .image-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .admin-image-card {
            background: rgba(255,255,255,0.8);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .admin-image-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        
        .btn-danger { background-color: #d32f2f; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; }
        .btn-danger:hover { background-color: #b71c1c; }
        .logout-btn { float: right; font-size: 0.8rem; padding: 8px 15px; }
    </style>
</head>
<body class="theme-3 fluid-background">

    <main class="page-container">
        <div class="glass-panel" style="max-width: 900px; margin: 0 auto; width: 100%;">
            
            <!-- BEREICH 1: LOGIN -->
            <div id="login-section" class="admin-section active">
                <h1 class="page-title" style="text-align: center;">Admin-Login</h1>
                
                <form id="login-form" class="glass-form" style="max-width: 400px; margin: 0 auto;">
                    <div class="form-group">
                        <label>E-Mail</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label>Passwort</label>
                        <input type="password" id="login-password" required placeholder="***">
                    </div>
                    <p id="login-error" style="color: red; display: none; margin-bottom: 10px;">Login fehlgeschlagen.</p>
                    <button type="submit" class="btn btn-large" style="width: 100%;">Einloggen</button>
                    <div style="text-align: center; margin-top: 15px;">
                        <a href="index.html" style="color: var(--text-muted);">← Zurück zur Startseite</a>
                    </div>
                </form>
            </div>

            <!-- BEREICH 2: DASHBOARD (Wird nach Login sichtbar) -->
            <div id="dashboard-section" class="admin-section">
                <button id="logout-btn" class="btn btn-outline logout-btn">Ausloggen</button>
                <h1 class="page-title">Galerie-Verwaltung</h1>
                <p class="page-subtitle">Hier kannst du neue Bilder hochladen oder alte entfernen.</p>

                <!-- Neues Bild hochladen -->
                <div class="upload-card">
                    <h3>Neues Bild hinzufügen</h3>
                    <form id="upload-form" class="glass-form" style="margin-top: 1rem;">
                        <div class="form-group">
                            <label>Bilddatei (JPG, PNG) *Pflichtfeld*</label>
                            <input type="file" id="image-file" accept="image/*" required>
                        </div>
                        <div class="form-group">
                            
                            <label>Titel des Bildes (optional)</label>
                            <input type="text" id="image-title" placeholder="z.B. Sommerwiese">
                        </div>
                        <div class="form-group">
                            
                            <label>Zusatz-Info / Jahr / Technik (optional)</label>
                            <input type="text" id="image-subtitle" placeholder="z.B. 2026 - Acryl auf Leinwand">
                        </div>
                        <button type="submit" id="upload-btn" class="btn">Bild in Galerie hochladen</button>
                        <p id="upload-status" style="margin-top: 10px; font-weight: bold;"></p>
                    </form>
                </div>

                <!-- Liste der bestehenden Bilder -->
                <h3>Aktuelle Galeriebilder</h3>
                <div id="admin-gallery-list" class="image-list">
                    <p>Lade Bilder aus der Datenbank...</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Firebase SDK (inklusive Storage für Dateiuploads) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4ZOLvHWohYF5IPsF2AmqWf039xMYAVs8",
            authDomain: "mama-portfolio.firebaseapp.com",
            projectId: "mama-portfolio",
            storageBucket: "mama-portfolio.firebasestorage.app",
            messagingSenderId: "953487415351",
            appId: "1:953487415351:web:83b1302f68960fa17987b2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // UI Elemente
        const loginSec = document.getElementById('login-section');
        const dashSec = document.getElementById('dashboard-section');
        const loginForm = document.getElementById('login-form');
        const uploadForm = document.getElementById('upload-form');
        const galleryList = document.getElementById('admin-gallery-list');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadStatus = document.getElementById('upload-status');

        // 1. AUTHENTIFIZIERUNG ÜBERWACHEN
        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                // Eingeloggt (Admin)
                loginSec.classList.remove('active');
                dashSec.classList.add('active');
                loadGallery();
            } else {
                // Ausgeloggt
                dashSec.classList.remove('active');
                loginSec.classList.add('active');
            }
        });

        // 2. LOGIN
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pw = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pw);
                document.getElementById('login-error').style.display = 'none';
                loginForm.reset();
            } catch (error) {
                document.getElementById('login-error').style.display = 'block';
            }
        });

        // 3. LOGOUT
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth);
        });

        // --- BILD-OPTIMIERUNG FUNKTION ---
        async function processAndConvertImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // Maximale Breite auf 1920px begrenzen für Performance
                        const MAX_WIDTH = 1920;
                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Als WebP mit 80% Qualität exportieren
                        canvas.toBlob((blob) => {
                            if (blob) {
                                resolve(blob);
                            } else {
                                reject(new Error("Canvas Konvertierung fehlgeschlagen"));
                            }
                        }, 'image/webp', 0.8);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // Upload Logik
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('image-file');
            const titleInput = document.getElementById('image-title');
            const subtitleInput = document.getElementById('image-subtitle');
            const uploadBtn = document.getElementById('upload-btn');

            if (fileInput.files.length === 0) return;

            const originalFile = fileInput.files[0];
            uploadBtn.disabled = true;
            uploadStatus.style.color = "var(--text-main)";
            uploadStatus.innerText = "Bild wird optimiert (WebP)...";

            try {
                // 1. Bild im Browser verarbeiten
                const webpBlob = await processAndConvertImage(originalFile);

                uploadStatus.innerText = "Hochladen nach Firebase...";

                // 2. Datei in Firebase Storage speichern (Dateiendung auf .webp ändern)
                const baseName = originalFile.name.split('.').slice(0, -1).join('.') || 'artwork';
                const filePath = `gallery/${Date.now()}_${baseName}.webp`;
                const storageRef = ref(storage, filePath);
                
                // Metadaten für Caching hinzufügen
                const metadata = {
                    contentType: 'image/webp',
                    cacheControl: 'public,max-age=31536000'
                };

                await uploadBytes(storageRef, webpBlob, metadata);
                
                // 3. Öffentliche URL abrufen
                const downloadURL = await getDownloadURL(storageRef);
                
                // 4. In Firestore Datenbank eintragen
                await addDoc(collection(db, 'gallery'), {
                    title: titleInput.value.trim(),
                    subtitle: subtitleInput.value.trim(),
                    url: downloadURL,
                    storagePath: filePath,
                    timestamp: Date.now()
                });

                uploadStatus.style.color = "green";
                uploadStatus.innerText = "Erfolgreich optimiert und hochgeladen!";
                uploadForm.reset();
                loadGallery();
                setTimeout(() => { uploadStatus.innerText = ""; }, 3000);
                
            } catch (error) {
                console.error("Upload Fehler:", error);
                uploadStatus.style.color = "red";
                uploadStatus.innerText = "Fehler beim Upload.";
            } finally {
                uploadBtn.disabled = false;
            }
        });

        // Galerie laden & Löschen
        async function loadGallery() {
            imageList.innerHTML = "<p>Lade Bilder...</p>";
            try {
                const q = query(collection(db, 'gallery'), orderBy('timestamp', 'desc'));
                const snapshot = await getDocs(q);
                imageList.innerHTML = "";
                
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "admin-image-card";
                    card.innerHTML = `
                        <img src="${data.url}" alt="${data.title}">
                        <p><strong>${data.title}</strong></p>
                        <button class="btn-delete" data-id="${docSnap.id}" data-path="${data.storagePath}">Löschen</button>
                    `;
                    imageList.appendChild(card);
                });

                // Delete Events
                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.onclick = async () => {
                        if (!confirm("Bild wirklich löschen?")) return;
                        const id = btn.getAttribute('data-id');
                        const path = btn.getAttribute('data-path');

                        try {
                            await deleteDoc(doc(db, 'gallery', id));
                            if (path) await deleteObject(ref(storage, path));
                            loadGallery();
                        } catch (e) { console.error(e); }
                    };
                });
            } catch (e) { console.error(e); }
        }

    </script>
</body>
</html>
